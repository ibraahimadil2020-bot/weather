<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Page</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Banner styling */
  .banner {
    width: 100%;
    height: 300px;
    background-image: url('https://via.placeholder.com/1200x300.png?text=Sample+Banner');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-shadow: 2px 2px 4px #000;
  }

  .banner h1 {
    font-size: 48px;
  }

  /* Optional content below banner */
  .content {
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="banner">
    <h1>Welcome to My Website</h1>
  </div>

  <div class="content">
    <p>This is a sample page with a banner image. You can replace the banner image URL with your own image.</p>
  </div>
<img src="./public/download (2).jfif" alt="" width="500">

</body>
</html>
